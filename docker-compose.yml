version: '3.8'

services:
  app_node_1:
    build: .
    container_name: app_node_1
    environment:
      - RUN_MODE=WEB
      - DB_HOST=inventory_postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db

  app_node_2:
    build: .
    container_name: app_node_2
    environment:
      - RUN_MODE=WEB
      - DB_HOST=inventory_postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - db

  gateway:
    image: nginx:latest
    container_name: nginx_balancer
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app_node_1
      - app_node_2

  db:
    image: postgres:15-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"