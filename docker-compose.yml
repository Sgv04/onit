version: '3.8'

services:
  app_node_1:
    build: .
    container_name: app_node_1
    environment:
      - RUN_MODE=WEB
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  app_node_2:
    build: .
    container_name: app_node_2
    environment:
      - RUN_MODE=WEB
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  app_node_3:
    build: .
    container_name: app_node_3
    environment:
      - RUN_MODE=gui
      - DISPLAY=host.docker.internal:0.0
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  gateway:
    image: nginx:latest
    container_name: nginx_balancer
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app_node_1
      - app_node_2
    networks:
      - app_network

  db:
    image: postgres:15-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s  
      timeout: 5s      
      retries: 3
    networks:
      - app_network

networks:
  app_network:
    driver: bridge