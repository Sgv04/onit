services:
  db:
    image: postgres:15-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - net

  app:
    build: .
    container_name: inventory_app
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST}
      - QT_DEBUG_PLUGINS=1  # Покажет подробности, если окно не откроется
      - DISPLAY=host.docker.internal:0.0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - net

networks:
  net:
    driver: bridge